<!DOCTYPE html>
<html>
<head>
<title>Truck Rego Lookup</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:80px;
background:#f5f5f5;
}

input{
padding:12px;
font-size:18px;
width:200px;
}

button{
padding:12px 20px;
font-size:18px;
margin-left:10px;
cursor:pointer;
}

#result{
margin-top:30px;
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Truck Rego Lookup</h2>

<input id="regoInput" placeholder="Enter Rego">
<button onclick="search()">Search</button>

<div id="result"></div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQNiqW-KNZDtBP3BkKtbvHF5UN8kH9Ctt3qRmy3Pv2t_Z3ajRjgvElYJApHJqsBd_64FsUDso8GQyO7/pub?output=csv";

let data=[];

fetch(sheetURL)
.then(res=>res.text())
.then(text=>{
let rows = text.split("\n").map(r =>
  r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g)
);
data=rows;
});

function search(){

let rego=document.getElementById("regoInput").value.trim().toUpperCase();

for(let i=1;i<data.length;i++){

if(data[i][0].toUpperCase()===rego){

document.getElementById("result").innerHTML =
"Expiry Date: "+data[i][1];
document.getElementById("result").innerHTML =
"Expiry Date: " + data[i][1] + "<br>" +
"Service A: " + data[i][2] + "<br>" +
"Service B: " + data[i][3];

return;

}

}

document.getElementById("result").innerHTML="Rego not found";

}

</script>

</body>
</html>
